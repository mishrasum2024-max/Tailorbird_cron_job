name: Playwright Tests

on:
  push:

  schedule:
    # Runs every day at 5:00 AM IST (11:30 PM UTC)
    - cron: "30 23 * * *"

  workflow_dispatch:

jobs:
  playwright-tests:
    runs-on: ubuntu-latest

    timeout-minutes: 150

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run login first, stop workflow if failed
      - name: Run login test
        run: npx playwright test --grep "@mandatory" --workers=1 --reporter=html

      # Runs only if login passed
      - name: Run remaining tests serially
        run: npx playwright test --grep-invert "@mandatory" --workers=1 --reporter=html

      # Upload report even if any test fails
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
